version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: ideadesign_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-ideaDesign}
      MYSQL_USER: ${DB_USER:-aiuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-aipassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ideadesign_network

  # Flask 后端
  backend:
    build: ./backend
    container_name: ideadesign_backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-aiuser}
      DB_PASSWORD: ${DB_PASSWORD:-aipassword}
      DB_NAME: ${DB_NAME:-ideaDesign}
      FLASK_ENV: production
    ports:
      - "5001:5001"
    depends_on:
      - mysql
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    networks:
      - ideadesign_network

  # React 前端
  frontend:
    build: ./frontweb
    container_name: ideadesign_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://backend:5001
    depends_on:
      - backend
    networks:
      - ideadesign_network

volumes:
  mysql_data:
  backend_uploads:

networks:
  ideadesign_network:
    driver: bridge
